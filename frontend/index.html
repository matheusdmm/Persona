<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Primary -->
        <title>Persona — D&D Character Creator</title>
        <meta name="description" content="Free D&D 5e and 5.5e (2024) character creator. Pick your race, class, spells, and gear — get a complete, print-ready character sheet in minutes. No account required." />
        <meta name="author" content="Matheus, matheusdmm.dev" />
        <meta name="robots" content="index, follow" />
        <meta name="theme-color" content="#1c1917" />
        <link rel="canonical" href="https://persona.vazio.club/" />
        <link rel="manifest" href="/site.webmanifest" />

        <!-- PWA / iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Persona" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Persona" />
        <meta property="og:url" content="https://persona.vazio.club/" />
        <meta property="og:title" content="Persona — D&D Character Creator" />
        <meta property="og:description" content="Free D&D 5e and 5.5e character creator. Race, class, spells, weapons, and gear — complete print-ready sheet in minutes." />
        <meta property="og:image" content="https://persona.vazio.club/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Persona — D&D Character Creator" />
        <meta name="twitter:description" content="Free D&D 5e and 5.5e character creator. Race, class, spells, and gear — print-ready sheet in minutes." />
        <meta name="twitter:image" content="https://persona.vazio.club/og-image.png" />

        <!-- Structured data -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Persona",
            "url": "https://persona.vazio.club",
            "description": "Free D&D 5e and 5.5e character creator. Build your hero, choose your spells and gear, and get a complete print-ready character sheet.",
            "applicationCategory": "GameApplication",
            "operatingSystem": "Web",
            "browserRequirements": "Requires JavaScript",
            "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "USD"
            },
            "author": {
                "@type": "Person",
                "name": "Matheus",
                "url": "https://matheusdmm.dev"
            }
        }
        </script>

        <!-- Theme: apply before paint to avoid flash -->
        <script>
          (function () {
            if (localStorage.getItem('theme') === 'dark')
              document.documentElement.classList.add('dark');
          })();
        </script>

        <!-- Favicon -->
        <link rel="icon" href="/favicon.ico" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="dns-prefetch" href="https://api.open5e.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/@fontsource/redaction-10/index.css"
            rel="stylesheet"
        />
    </head>

    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
